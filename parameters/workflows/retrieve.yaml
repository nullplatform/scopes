steps:
  - name: build_context
    type: script
    file: "$SERVICE_PATH/parameters/build_context"
    output:
      - { name: ACTIVE_PROVIDER, type: environment }
      - { name: PROVIDER_DIR, type: environment }
      - { name: PARAMETER_KIND, type: environment }
      - { name: EXTERNAL_ID, type: environment }
      - { name: PARAMETER_NAME, type: environment }
      - { name: PARAMETER_ENCODING, type: environment }
  - name: retrieve
    type: script
    file: "$SERVICE_PATH/parameters/retrieve"
