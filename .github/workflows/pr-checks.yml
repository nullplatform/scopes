name: PR Checks

on:
  pull_request:
    branches: [main, beta]

jobs:
  go:
    uses: nullplatform/actions-nullplatform/.github/workflows/pr-checks-go.yml@main
    with:
      working-directory: k8s/log/kube-logger-go
      go-version: '1.25'

  shellcheck:
    uses: nullplatform/actions-nullplatform/.github/workflows/shellcheck.yml@main

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install gomplate
        run: |
          sudo curl -fsSL -o /usr/local/bin/gomplate \
            https://github.com/hairyhenderson/gomplate/releases/download/v4.3.3/gomplate_linux-amd64
          sudo chmod +x /usr/local/bin/gomplate
          gomplate --version

      - name: Run unit tests
        run: make test-unit
