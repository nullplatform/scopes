provider_categories:
  - container-orchestration
  - cloud-providers
steps:
  - name: load logging
    type: script
    file: "$OVERRIDES_PATH/logging"
    output:
      - name: log
        type: function
        parameters:
          level: string
          message: string
  - name: trigger
    type: script
    file: "$OVERRIDES_PATH/scope/trigger"
