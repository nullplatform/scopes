include:
  - "$SERVICE_PATH/values.yaml"
steps:
  - name: load logging
    type: script
    file: "$OVERRIDES_PATH/logging"
    output:
      - name: log
        type: function
        parameters:
          level: string
          message: string
  - name: kill job execution
    type: script
    file: "$OVERRIDES_PATH/deployment/kill_job_execution"
