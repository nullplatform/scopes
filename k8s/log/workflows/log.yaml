steps:
  - name: load logging
    type: script
    file: "$SERVICE_PATH/logging"
    output:
      - name: log
        type: function
        parameters:
          level: string
          message: string
  - name: build context
    type: script
    file: "$SERVICE_PATH/log/build_context"
    configuration:
      K8S_NAMESPACE: $K8S_NAMESPACE
  - name: logs
    type: script
    file: "$SERVICE_PATH/log/log"